name: Build Android APK & AABb

env:
  GRADLE_OPTS: -Xmx4096m -XX:+UseG1GC
  NODE_VERSION: '20'
  JAVA_VERSION: '17'
  main_project_module: app
  playstore_name: Frogobox ID

on:
  push:
    branches:
      - 'release/**'
      - 'main'
      - 'master'
  pull_request:
    branches:
      - 'main'
      - 'master'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: ${{ env.JAVA_VERSION }}
          cache: 'gradle'

      - name: Cache Gradle dependencies
        uses: actions/cache@v3
        with:
          path: ~/.gradle/caches
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Install npm dependencies
        run: npm ci --prefer-offline --no-audit
        continue-on-error: false

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Validate Gradle wrapper
        run: ./gradlew wrapper --gradle-version=8.6 2>&1 | head -50

      - name: Build Debug APK
        run: ./gradlew assembleDebug --build-cache --parallel
        env:
          CI_BUILD: '1'
        continue-on-error: false

      - name: Build Release APK
        run: ./gradlew assembleRelease --build-cache --parallel
        env:
          CI_BUILD: '1'
        continue-on-error: false

      - name: Build Release Bundle (AAB)
        run: ./gradlew ${{ env.main_project_module }}:bundleRelease --build-cache --parallel
        env:
          CI_BUILD: '1'
          GPLAY_BUILD: '1'
        continue-on-error: false

      - name: Set build info variables
        if: success()
        run: |
          echo "build_date=$(date +'%Y-%m-%d')" >> $GITHUB_ENV
          echo "build_time=$(date +'%H:%M:%S')" >> $GITHUB_ENV
          echo "repo_name=$(echo '${{ github.repository }}' | awk -F '/' '{print $2}')" >> $GITHUB_ENV
          echo "version_name=$(cat package.json | grep '"version"' | head -1 | awk -F '"' '{print $4}')" >> $GITHUB_ENV
          echo "version_code=$(cat package.json | grep 'versionCode' | awk -F ':' '{print $2}' | tr -d ' ,')" >> $GITHUB_ENV

      - name: Upload Debug APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.repo_name }}-debug-${{ env.build_date }}
          path: ${{ env.main_project_module }}/build/outputs/apk/debug/
          retention-days: 30
          compression-level: 6

      - name: Upload Release APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.repo_name }}-release-${{ env.build_date }}
          path: ${{ env.main_project_module }}/build/outputs/apk/release/
          retention-days: 30
          compression-level: 6

      - name: Upload App Bundle (AAB)
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.repo_name }}-aab-${{ env.build_date }}
          path: ${{ env.main_project_module }}/build/outputs/bundle/release/
          retention-days: 30
          compression-level: 6

      - name: Generate build report
        if: always()
        run: |
          cat > build_report.txt << EOF
          Build Report
          ============
          Repository: ${{ github.repository }}
          Branch: ${{ github.ref_name }}
          Commit: ${{ github.sha }}
          Author: ${{ github.actor }}
          Build Date: ${{ env.build_date }} ${{ env.build_time }}
          Build Status: ${{ job.status }}
          
          Artifacts Generated:
          - Debug APK: ${{ env.main_project_module }}/build/outputs/apk/debug/
          - Release APK: ${{ env.main_project_module }}/build/outputs/apk/release/
          - Bundle AAB: ${{ env.main_project_module }}/build/outputs/bundle/release/
          EOF
          cat build_report.txt

      - name: Upload build report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-report-${{ env.build_date }}
          path: build_report.txt
          retention-days: 30

      - name: Comment PR with build status
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('build_report.txt', 'utf8');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 🔨 Build Report\n\`\`\`\n${report}\n\`\`\``
            });

      - name: Print error logs on failure
        if: failure()
        run: |
          echo "::error::Build failed! Check logs above for details"
          echo "::notice::Troubleshooting guide:"
          echo "1. Ensure package-lock.json is committed and in sync with package.json"
          echo "2. Node version is set to 20 or higher (currently: ${{ env.NODE_VERSION }})"
          echo "3. Java version is set to 17 (currently: ${{ env.JAVA_VERSION }})"
          echo "4. Run 'npm ci' locally to sync dependencies"
          
